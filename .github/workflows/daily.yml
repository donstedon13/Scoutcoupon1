name: ScoutCoupon Daily Scraper

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run scraper
        run: node scraper.js
        env:
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}

      - name: Commit & push data
        run: |
          git config user.name "ScoutCoupon Bot"
          git config user.email "bot@scoutcoupon"
          git add data/
          git diff --staged --quiet || git commit -m "Daily data $(date +'%Y-%m-%d')"
          git push
